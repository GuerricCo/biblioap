<div class="list-page">
  <div class="list-header">
    <div>
      <h1 jhiTranslate="bibliApp.category.home.title">Catégories</h1>
      <p>Gérez les catégories de votre bibliothèque</p>
    </div>
    <div class="list-header-actions">
      <button class="btn-refresh" (click)="load()" [disabled]="isLoading()">
        <fa-icon icon="sync" [animation]="isLoading() ? 'spin' : undefined" />
        <span jhiTranslate="bibliApp.category.home.refreshListLabel">Actualiser</span>
      </button>
      <button class="btn-create" id="jh-create-entity" data-cy="entityCreateButton" [routerLink]="['/category/new']">
        <fa-icon icon="plus" />
        <span jhiTranslate="bibliApp.category.home.createLabel">Nouvelle catégorie</span>
      </button>
    </div>
  </div>

  <jhi-alert-error />
  <jhi-alert />

  @if (categories().length === 0) {
    <div class="list-empty">
      <fa-icon icon="tags" />
      <p jhiTranslate="bibliApp.category.home.notFound">Aucune catégorie trouvée</p>
    </div>
  } @else {
    <div class="list-card">
      <div class="table-responsive">
        <table class="list-table" aria-describedby="page-heading">
          <thead>
            <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
              <th scope="col" jhiSortBy="name">
                <div class="th-content">
                  <span jhiTranslate="bibliApp.category.name">Nom</span>
                  <fa-icon icon="sort" />
                </div>
              </th>
              <th scope="col" jhiSortBy="description">
                <div class="th-content">
                  <span jhiTranslate="bibliApp.category.description">Description</span>
                </div>
              </th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody>
            @for (category of categories(); track trackId(category)) {
              <tr data-cy="entityTable">
                <td class="td-title">
                  <a [routerLink]="['/category', category.id, 'view']">
                    <span class="badge-category">{{ category.name }}</span>
                  </a>
                </td>
                <td class="td-biography">{{ category.description }}</td>
                <td class="td-actions">
                  <div class="action-group">
                    <a
                      [routerLink]="['/category', category.id, 'view']"
                      class="btn-action btn-action--view"
                      data-cy="entityDetailsButton"
                      title="Voir"
                    >
                      <fa-icon icon="eye" />
                    </a>
                    <a
                      [routerLink]="['/category', category.id, 'edit']"
                      class="btn-action btn-action--edit"
                      data-cy="entityEditButton"
                      title="Éditer"
                    >
                      <fa-icon icon="pencil-alt" />
                    </a>
                    <button
                      type="button"
                      (click)="delete(category)"
                      class="btn-action btn-action--delete"
                      data-cy="entityDeleteButton"
                      title="Supprimer"
                    >
                      <fa-icon icon="times" />
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  }
</div>
