@if (!isAuthPage()) {
  <aside class="sidebar">
    <nav class="sidebar-nav">
      @if (currentLibrary()) {
        <div class="sidebar-library-header">
          <div class="sidebar-library-avatar">
            {{ currentLibrary()!.name!.charAt(0).toUpperCase() }}
          </div>
          <div class="sidebar-library-info">
            <span class="sidebar-library-name">{{ currentLibrary()!.name }}</span>
            <a class="sidebar-library-change" routerLink="/library">Changer</a>
          </div>
        </div>
        <div class="sidebar-divider"></div>
      }

      @if (account() !== null) {
        <div class="sidebar-section">
          <span class="sidebar-section-label">Catalogue</span>
          <ul class="sidebar-menu">
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'books']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="book-open" /></span>
                <span>Livres</span>
              </a>
            </li>
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'authors']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="users" /></span>
                <span>Auteurs</span>
              </a>
            </li>
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'categories']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="th-large" /></span>
                <span>Catégories</span>
              </a>
            </li>
          </ul>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <span class="sidebar-section-label">Gestion</span>
          <ul class="sidebar-menu">
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'members']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="user" /></span>
                <span>Membres</span>
              </a>
            </li>
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'loans']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="file-alt" /></span>
                <span>Prêts</span>
              </a>
            </li>
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'reservations']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="list" /></span>
                <span>Réservations</span>
              </a>
            </li>
          </ul>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-section">
          <span class="sidebar-section-label">Avis</span>
          <ul class="sidebar-menu">
            <li>
              <a
                class="sidebar-link"
                [routerLink]="['/app', libraryId(), 'reviews']"
                routerLinkActive="sidebar-link--active"
                [routerLinkActiveOptions]="{ exact: false }"
              >
                <span class="sidebar-icon"><fa-icon icon="star" /></span>
                <span>Avis &amp; notes</span>
              </a>
            </li>
          </ul>
        </div>
      }
    </nav>
  </aside>
}
